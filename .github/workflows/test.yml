name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Core E2E tests
        run: bash scripts/test/test-coconut.sh
      - name: Multi-adapter tests
        run: bash scripts/test/test-multi-adapter.sh
      - name: Hardening tests
        run: bash scripts/test/test-hardening.sh
      - name: Webhook tests
        run: bash scripts/test/test-webhook.sh
      - name: Rate limit tests
        run: bash scripts/test/test-ratelimit.sh
      - name: Docker validation
        run: bash scripts/test/test-docker.sh
