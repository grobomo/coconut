name: Secret Scan
on:
  push:
    branches: [main, 001-build-coconut]
  pull_request:
    branches: [main, 001-build-coconut]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and PII
        run: |
          echo "=== Scanning for secrets and PII ==="
          FOUND=0

          # API keys and tokens
          if grep -rn "sk-ant-\|AKIA[0-9A-Z]\|ghp_[a-zA-Z0-9]\|gho_[a-zA-Z0-9]" \
            --include="*.py" --include="*.sh" --include="*.json" --include="*.md" --include="*.yml" \
            --exclude-dir=.git .; then
            echo "FAIL: Found API keys/tokens"
            FOUND=1
          fi

          # Hardcoded IPs (private ranges OK in examples)
          if grep -rn "[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}" \
            --include="*.py" --include="*.sh" --include="*.json" \
            --exclude-dir=.git . | grep -v "127.0.0.1\|0.0.0.0\|localhost\|example\|0.1.0\|1.0.0"; then
            echo "WARN: Found IP addresses - verify they are not real"
          fi

          # AWS account IDs
          if grep -rn "[0-9]\{12\}" \
            --include="*.py" --include="*.sh" --include="*.json" \
            --exclude-dir=.git . | grep -i "account\|arn:aws"; then
            echo "FAIL: Found AWS account references"
            FOUND=1
          fi

          # Passwords and secrets in env files
          if grep -rn "PASSWORD=.\+\|SECRET=.\+" \
            --include="*.env" --exclude="*.example" \
            --exclude-dir=.git . 2>/dev/null; then
            echo "FAIL: Found secrets in env files"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "Secret scan FAILED"
            exit 1
          fi
          echo "Secret scan PASSED"
